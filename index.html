<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Refraction Glass Marbles!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Summer white / Soft cream Japanese base */
            background-color: #f7f5f0;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            overflow: hidden;
            filter: url(#marble-filter);
        }

        /* Soft Summer Ambient Glows */
        .bg-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.5;
            z-index: 2;
        }

        .bg-glow-1 {
            top: -10%;
            left: 15%;
            width: 55vw;
            height: 55vw;
            /* Clear skies blue */
            background: radial-gradient(circle, #a2d2ff 0%, transparent 70%);
        }

        .bg-glow-2 {
            bottom: -10%;
            right: 15%;
            width: 55vw;
            height: 55vw;
            /* Soft sunset orange */
            background: radial-gradient(circle, #ffb703 0%, transparent 70%);
        }

        /* High-Contrast Floating Shapes (Refraction Bending) */
        .bg-shape {
            position: absolute;
            opacity: 0.9;
            z-index: 3;
        }

        .bg-shape-1 {
            top: 22%;
            left: 20%;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff6b35, #ffb703);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        .bg-shape-2 {
            bottom: 25%;
            right: 22%;
            width: 130px;
            height: 130px;
            /* Deep Indigo/Sea Blue */
            background: linear-gradient(135deg, #0077b6, #90e0ef);
            border-radius: 32px;
            transform: rotate(15deg);
        }

        /* Minimalist Typography Layer */
        #content {
            max-width: 640px;
            margin: auto;
            padding: 48px 32px;
            text-align: center;
            font-family: system-ui, -apple-system, sans-serif;
            color: #1a2238;
            z-index: 4;
        }

        ::selection {
            background-color: rgb(255, 136, 0);
            color: black;
            /* Text color */
        }

        #content h1 {
            font-size: 3rem;
            font-weight: 700;
            margin: 0 0 16px 0;
            letter-spacing: -0.02em;
            color: #1a2238;
        }

        #content p {
            font-size: 1rem;
            line-height: 1.7;
            /* Soft charcoal */
            color: #5c677d;
            margin: 0;
            font-weight: 400;
        }
    </style>
</head>

<body>
    <div id="container">
        <!-- Interactive Background Elements -->
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>
        <div class="bg-shape bg-shape-1"></div>
        <div class="bg-shape bg-shape-2"></div>

        <!-- Main Content Layer -->
        <div id="content">
            <h1>Glass Marbles!</h1>
            <p>Move your mouse around this container to see the WebGL refraction and SVG distortion in action.</p>
        </div>
    </div>

    <!-- SVG Filter Definition -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="marble-filter" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
                <feImage id="displaceRefract" result="displaceRefract" preserveAspectRatio="none" />
                <feImage id="shadowMap" result="shadowMap" preserveAspectRatio="none" />
                <feImage id="colorMap" result="colorMap" preserveAspectRatio="none" />

                <feGaussianBlur in="shadowMap" result="softShadowMap" stdDeviation="8" />

                <feBlend in="softShadowMap" in2="SourceGraphic" mode="multiply" result="shadowedDOM" />
                <!-- <feComposite in="softShadowMap" in2="SourceGraphic"
                             operator="arithmetic"
                             k1="1" k2="0" k3="0" k4="0"
                             result="shadowedDOM" /> -->

                <feGaussianBlur in="displaceRefract" result="softDisplaceRefract" stdDeviation="1" />

                <feDisplacementMap in="shadowedDOM" in2="softDisplaceRefract"
                                   scale="100" xChannelSelector="R" yChannelSelector="G"
                                   result="refractedDom" />

                <!-- <feComposite in="colorMap" in2="refractedDom" operator="over" result="finalOutput" /> -->
                <feBlend in="colorMap" in2="refractedDom" operator="overlay" result="finalOutput" />
            </filter>
        </defs>
    </svg>

    <script type="x-shader/x-vertex" id="vert">
        attribute vec2 a_position;
        void main() {
            gl_Position = vec4(a_position, 0.0, 1.0);
        }
    </script>

    <script type="x-shader/x-fragment" id="frag">
        #define MARBLE_COUNT 2
        #define ITERATIONS 4
        #define DISPLACEMENT_SCALE 100.0
        precision mediump float;
        uniform vec2 u_canvas_size;
        uniform vec2 u_viewport_size;
        uniform vec3 u_marble_positions[MARBLE_COUNT];
        uniform mat3 u_marble_matrices[MARBLE_COUNT];
        uniform float u_marble_radii[MARBLE_COUNT];
        uniform vec3 u_glass_colors[MARBLE_COUNT];
        uniform vec3 u_core_colors[MARBLE_COUNT];
        uniform int u_mode;
        // Modes:
        // 0: displacement map for refraction
        // 1: displacement map for reflection

        void main() {
            vec4 color = vec4(1.0);

            if(u_mode==2){
                color.a = 0.0;
            }
            
            vec2 uv = gl_FragCoord.xy/u_viewport_size*u_canvas_size;
            vec3 rp = vec3(uv, 1000);
            vec3 rd = vec3(0, 0, -1);
            vec3 lastEntry = rp;

            if(u_mode==3){
                rp = vec3(uv, 0);
                rd = vec3(-1, 1, 2);
            }

            vec3 firstNormal = vec3(0);
            vec3 firstRayDirection = normalize(rd);


            for(int iteration=0;iteration<ITERATIONS;iteration++){

                float f_min = -1.0;
                vec3 o_min;
                vec3 xvec = vec3(1, 0, 0);
                vec3 yvec = vec3(0, 0, -1);
                vec3 zvec = vec3(0, 1, 0);
                vec3 glassColor = vec3(1.0);
                vec3 coreColor = vec3(0.0);
                float R = 50.0;
                float volume = 0.0;


                for(int marble_id=0;marble_id<MARBLE_COUNT;marble_id++){
                    vec3 o = u_marble_positions[marble_id];
                    float radius_val = u_marble_radii[marble_id];
                    vec3 d = rp - o;
                    float a = dot(rd, rd);
                    float a_inv_2 = 1.0/2.0/a;
                    float b = 2.0 * dot(d, rd);
                    float c = dot(d, d) - radius_val*radius_val;
                    float D = b*b - 4.0*a*c;
                    if (D>0.0){
                        float f_center = -b * a_inv_2;
                        float f_diff = sqrt(D) * a_inv_2;
                        float f1 = f_center - f_diff;
                        float f2 = f_center + f_diff;
                        float f = (f1 > 0.01) ? f1 : f2;
                        if (f > 0.01 && (f < f_min || f_min < 0.0)) {
                            f_min = f;
                            o_min = o;
                            R = radius_val;
                            xvec = u_marble_matrices[marble_id][0];
                            yvec = u_marble_matrices[marble_id][1];
                            zvec = u_marble_matrices[marble_id][2];
                            glassColor = u_glass_colors[marble_id];
                            coreColor = u_core_colors[marble_id];
                        }
                    }
                }

                bool inside = false;

                if(f_min >= 0.0){
                    rp = rp + rd * f_min;
                    vec3 n = normalize(rp - o_min);
                    if(firstNormal.z==0.0) firstNormal = n;
                    float cosf = dot(rd, n);
                    vec3 sinvec = rd - cosf * n;
                    float N = 1.5;
                    if (cosf > 0.0) N = 1.0/N;
                    else inside = true;
                    float cosf2 = N*N*dot(rd, rd) - dot(sinvec, sinvec);
                    if (cosf2 > 0.0){
                        rd = sinvec + n * sqrt(cosf2) * sign(cosf);
                    } else {
                        rd = sinvec - n * cosf;
                    }
                    rd = normalize(rd);

                    // Inside the marble
                    f_min=-1.0;
                    
                    if(inside){
                        // Ray trace the core.
                        lastEntry = rp;
                        float A = 0.2; // 0.0 = flat plane, > 0.0 = parabola
                        float B = 0.2; // 0.0 = flat plane, > 0.0 = parabola

                        float rdx = dot(rd, xvec) / R;
                        float rdy = dot(rd, yvec) / R;
                        float rpx = dot(rp - o_min, xvec) / R;
                        float rpy = dot(rp - o_min, yvec) / R;

                        float a = A * (rdx * rdx);
                        float b = 2.0 * A * rpx * rdx - rdy;
                        float c = A * (rpx * rpx - 1.0) - rpy;

                        float D = b * b - 4.0 * a * c;

                        vec3 n = vec3(0);

                        if (D >= 0.0) {
                            float sqrtD = sqrt(D);
                            float den1 = -b - sqrtD;
                            float f = (2.0 * c) / den1;
                            if (f > 0.001 && (f < f_min || f_min < 0.0)) {
                                vec3 relative_hit_pos = rp + rd * f - o_min;
                                float hit_x = dot(relative_hit_pos, xvec) / R;
                                if (abs(hit_x) <= 1.0 && abs(dot(relative_hit_pos, zvec)) < (1.0 - hit_x*hit_x) * B * R) {
                                    f_min = f;
                                    float hit_x = dot(relative_hit_pos, xvec);
                                    n = normalize((2.0 * A * hit_x) * xvec - yvec);
                                }
                                // color.x = fract(0.2*dot(relative_hit_pos, zvec));
                                // color.y = fract(0.2*dot(relative_hit_pos, xvec));
                            }
                            float den2 = -b + sqrtD;
                            f = (abs(den2) > 0.0001) ? (2.0 * c) / den2 : -1.0;
                            if (f > 0.001 && (f < f_min || f_min < 0.0)) {
                                vec3 relative_hit_pos = rp + rd * f - o_min;
                                float hit_x = dot(relative_hit_pos, xvec) / R;
                                if (abs(hit_x) <= 1.0 && abs(dot(relative_hit_pos, zvec)) < (1.0 - hit_x*hit_x) * B * R) {
                                    f_min = f;
                                    float hit_x = dot(relative_hit_pos, xvec);
                                    n = normalize((2.0 * A * hit_x) * xvec - yvec);
                                }
                            }
                        }
                    }

                    if(f_min>0.0){
                        color.rgb = mix(color.rgb, coreColor, abs(dot(rd, n)));
                        color.a = 2.0;
                        inside = false;
                        rp = rp + rd * f_min;
                    }

                    if(!inside){
                        volume = distance(lastEntry, rp)*0.05;
                    }


                    float alpha = 0.0;
                    if(volume>0.0){
                        color.r *= pow(glassColor.r, volume);
                        color.g *= pow(glassColor.g, volume);
                        color.b *= pow(glassColor.b, volume);
                        color.a = 1.0-(1.0 - color.a)*exp(-volume*0.1);
                    }
                }

                 if(u_mode==2 || u_mode==3){
                    float highlight = dot(firstNormal, -firstRayDirection);
                    if(u_mode==2){
                        highlight += pow(1.0 - highlight, 5.0) * firstRayDirection.z * 5.0;
                    }
                    highlight = pow(highlight, 5.0) * 0.1;
                  
                    color = mix(color, color + vec4(1), highlight);
                }

            }

            
            if(u_mode==0 || u_mode==1){
                // pack displacement map.
                rp += rd / rd.z * rp.z;
                color.xy = (rp.xy - uv) / DISPLACEMENT_SCALE * vec2(-1.0, 1.0) + 0.5;
                color.a=1.0;
            }

           
            gl_FragColor = color;
        }
    </script>

    <script>
        const container = document.getElementById('container');
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true, alpha: true });

        function createShader(type, sourceId) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, document.getElementById(sourceId).textContent.trim());
            gl.compileShader(shader);
            if (gl.getShaderParameter(shader, gl.COMPILE_STATUS)) return shader;
            console.error(gl.getShaderInfoLog(shader));
        }

        function linkProgram(shaders) {
            const program = gl.createProgram();
            for (let shader of shaders) gl.attachShader(program, shader);
            gl.linkProgram(program);
            return program;
        }

        const vertShader = createShader(gl.VERTEX_SHADER, 'vert');
        const fragShader = createShader(gl.FRAGMENT_SHADER, 'frag');
        const program = linkProgram([vertShader, fragShader]);
        gl.useProgram(program);

        // Fullscreen Quad Geometry
        const vertices = new Float32Array([-1, -1, 3, -1, -1, 3]);
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
        const a_position = gl.getAttribLocation(program, 'a_position');
        gl.enableVertexAttribArray(a_position);
        gl.vertexAttribPointer(a_position, 2, gl.FLOAT, false, 0, 0);

        // Declare uniform Locations
        const u_canvas_size = gl.getUniformLocation(program, 'u_canvas_size');
        const u_viewport_size = gl.getUniformLocation(program, 'u_viewport_size');
        const u_marble_positions = gl.getUniformLocation(program, 'u_marble_positions');
        const u_marble_matrices = gl.getUniformLocation(program, 'u_marble_matrices');
        const u_marble_radii = gl.getUniformLocation(program, 'u_marble_radii');
        const u_glass_colors = gl.getUniformLocation(program, 'u_glass_colors');
        const u_core_colors = gl.getUniformLocation(program, 'u_core_colors');
        const u_mode = gl.getUniformLocation(program, 'u_mode');

        // State Tracking (Identity matrix & tunable properties)
        const state = {
            marbles: [
                {
                    x: window.innerWidth / 3,
                    y: window.innerHeight / 2,
                    z: 20, r: 60, mass: 60 ** 3,
                    glassColor: [0.65, 0.88, 0.95],
                    coreColor: [1.0, 1.0, 1.0],
                    vx: 0, vy: 0, vz: 0, q: [1, 0, 0, 0],
                    matrix: [1, 0, 0, 0, 1, 0, 0, 0, 1],
                    isDragging: false
                },
                {
                    x: 2 * window.innerWidth / 3,
                    y: window.innerHeight / 2,
                    z: 20, r: 40, mass: 40 ** 3,
                    glassColor: [0.98, 0.85, 0.55],
                    coreColor: [1.0, 1.0, 1.0],
                    vx: 0, vy: 0, vz: 0, q: [1, 0, 0, 0],
                    matrix: [1, 0, 0, 0, 1, 0, 0, 0, 1],
                    isDragging: false
                }
            ],
            mouseX: 0, mouseY: 0, draggedIdx: -1, dragOffsetX: 0, dragOffsetY: 0,
            settleFrames: 10, width: 512, height: 512
        };

        // Resize Tracking.
        function resize() {
            state.width = window.innerWidth;
            state.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Mouse interactions

        // Bulletproof coordinate extractor for both mouse and mobile touch inputs
        function getEventCoords(e, containerElement) {
            const rect = containerElement.getBoundingClientRect();
            let clientX, clientY;

            // Check if it's a touch event
            if (e.touches !== undefined) {
                // Use active touches first, fall back to changedTouches (crucial for touchend), then targetTouches
                const touch = e.touches[0] || e.changedTouches[0] || e.targetTouches[0];
                clientX = touch.clientX;
                clientY = touch.clientY;
            } else {
                // Standard mouse fallback
                clientX = e.clientX;
                clientY = e.clientY;
            }

            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        // Unified Start Handler (mousedown & touchstart)
        const handleStart = (e) => {
            const container = document.getElementById('container');
            const { x: mouseX, y: mouseY } = getEventCoords(e, container);

            let hitIdx = -1;
            for (let i = 0; i < state.marbles.length; i++) {
                const m = state.marbles[i];
                if (Math.hypot(mouseX - m.x, mouseY - m.y) < m.r) {
                    if (hitIdx === -1 || m.z > state.marbles[hitIdx].z) hitIdx = i;
                }
            }

            if (hitIdx !== -1) {
                if (e.cancelable) e.preventDefault();

                state.draggedIdx = hitIdx;
                state.marbles[hitIdx].isDragging = true;
                state.dragOffsetX = mouseX - state.marbles[hitIdx].x;
                state.dragOffsetY = mouseY - state.marbles[hitIdx].y;

                // Lock immediate tracked coordinates to the tap position to prevent an initial jump frame
                state.mouseX = mouseX;
                state.mouseY = mouseY;
            }
        };

        // Unified Move Handler (mousemove & touchmove)
        const handleMove = (e) => {
            // Only capture coordinates if we have active touches or it's a mouse move
            if (e.touches && e.touches.length === 0) return;

            const container = document.getElementById('container');
            const { x: mouseX, y: mouseY } = getEventCoords(e, container);

            state.mouseX = mouseX;
            state.mouseY = mouseY;

            if (state.draggedIdx !== -1 && e.cancelable) {
                e.preventDefault();
            }
        };

        // Unified End Drag Handler (mouseup, mouseleave, touchend, touchcancel)
        const endDrag = () => {
            if (state.draggedIdx !== -1) {
                state.marbles[state.draggedIdx].isDragging = false;
                state.draggedIdx = -1;
            }
        };

        // Event bindings remain the same
        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('mouseleave', endDrag);

        window.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', endDrag);
        window.addEventListener('touchcancel', endDrag);



        // 3D Quaternion/Rotor Math
        const qMul = ([w1, x1, y1, z1], [w2, x2, y2, z2]) => {
            const w = w1 * w2 - x1 * x2 - y1 * y2 - z1 * z2;
            const x = w1 * x2 + x1 * w2 + y1 * z2 - z1 * y2;
            const y = w1 * y2 - x1 * z2 + y1 * w2 + z1 * x2;
            const z = w1 * z2 + x1 * y2 - y1 * x2 + z1 * w2;
            const l = Math.hypot(w, x, y, z);
            return [w / l, x / l, y / l, z / l];
        };
        const qToMat = ([w, x, y, z]) => [
            1 - 2 * y * y - 2 * z * z, 2 * x * y + 2 * w * z, 2 * x * z - 2 * w * y,
            2 * x * y - 2 * w * z, 1 - 2 * x * x - 2 * z * z, 2 * y * z + 2 * w * x,
            2 * x * z + 2 * w * y, 2 * y * z - 2 * w * x, 1 - 2 * x * x - 2 * y * y
        ];

        // Bouncing, elastic collision, and rolling physics simulation
        function updatePhysics() {
            // 1. Integration (Gravity, Movement, and Dragging)
            state.marbles.forEach(m => {
                if (m.isDragging) {
                    const tx = state.mouseX - state.dragOffsetX;
                    const ty = state.mouseY - state.dragOffsetY;
                    m.vx = tx - m.x;
                    m.vy = ty - m.y;
                    m.x = tx;
                    m.y = ty;

                    const targetZ = 200; // Lift off ground when dragged
                    m.vz = (targetZ - m.z) * 0.15;
                    m.z += m.vz;
                } else {
                    m.vz -= 0.8; // Gravity

                    // Air/Rolling friction
                    m.vx *= 0.99;
                    m.vy *= 0.99;
                    m.vz *= 0.995;

                    m.x += m.vx;
                    m.y += m.vy;
                    m.z += m.vz;
                }
            });

            // 2. Marble-Marble Collision Resolution
            const [m1, m2] = state.marbles;
            const dx = m1.x - m2.x, dy = m1.y - m2.y, dz = m1.z - m2.z;
            const dist = Math.hypot(dx, dy, dz);
            const minDist = m1.r + m2.r;

            if (dist < minDist && dist > 0.0001) {
                const nx = dx / dist, ny = dy / dist, nz = dz / dist;
                const overlap = minDist - dist;

                // Positional Correction: Push apart weighted by mass
                const totalMass = m1.mass + m2.mass;
                const m1Ratio = m2.mass / totalMass; // Heavier marble moves less
                const m2Ratio = m1.mass / totalMass;

                if (!m1.isDragging && !m2.isDragging) {
                    m1.x += nx * overlap * m1Ratio; m1.y += ny * overlap * m1Ratio; m1.z += nz * overlap * m1Ratio;
                    m2.x -= nx * overlap * m2Ratio; m2.y -= ny * overlap * m2Ratio; m2.z -= nz * overlap * m2Ratio;
                } else if (!m1.isDragging) {
                    m1.x += nx * overlap; m1.y += ny * overlap; m1.z += nz * overlap;
                } else if (!m2.isDragging) {
                    m2.x -= nx * overlap; m2.y -= ny * overlap; m2.z -= nz * overlap;
                }

                // Velocity Impulse: Standard 3D Elastic Collision
                const relVx = m1.vx - m2.vx;
                const relVy = m1.vy - m2.vy;
                const relVz = m1.vz - m2.vz;
                const velAlongNormal = relVx * nx + relVy * ny + relVz * nz;

                // CRITICAL FIX: Only resolve if they are actively moving towards each other
                if (velAlongNormal < 0) {
                    const restitution = 0.8; // Bounciness
                    const j = -(1 + restitution) * velAlongNormal / (1 / m1.mass + 1 / m2.mass);

                    const impulseX = j * nx;
                    const impulseY = j * ny;
                    const impulseZ = j * nz;

                    if (!m1.isDragging) {
                        m1.vx += impulseX / m1.mass;
                        m1.vy += impulseY / m1.mass;
                        m1.vz += impulseZ / m1.mass;
                    }
                    if (!m2.isDragging) {
                        m2.vx -= impulseX / m2.mass;
                        m2.vy -= impulseY / m2.mass;
                        m2.vz -= impulseZ / m2.mass;
                    }
                }
            }

            // 3. Environment Constraints (Must happen AFTER marble collisions)
            state.marbles.forEach(m => {
                if (!m.isDragging) {
                    // Floor Collision
                    if (m.z < m.r) {
                        m.z = m.r;
                        // CRITICAL FIX: Threshold to stop micro-bounces
                        if (m.vz < -2.0) {
                            m.vz *= -0.55;
                        } else {
                            m.vz = 0; // True rest state
                            m.vx *= 0.95; // Added ground friction
                            m.vy *= 0.95;
                        }
                    }

                    // Wall Collisions
                    if (m.x < m.r) { m.x = m.r; m.vx *= -0.8; }
                    else if (m.x > window.innerWidth - m.r) { m.x = window.innerWidth - m.r; m.vx *= -0.8; }

                    if (m.y < m.r) { m.y = m.r; m.vy *= -0.8; }
                    else if (m.y > window.innerHeight - m.r) { m.y = window.innerHeight - m.r; m.vy *= -0.8; }
                }

                // 4. Visual Rolling (Quaternion Update)
                const speedXY = Math.hypot(m.vx, m.vy);
                if (speedXY > 0.01) {
                    const angle = speedXY / m.r;
                    const c = Math.cos(angle / 2);
                    const s = Math.sin(angle / 2) / speedXY;
                    // m.q = qMul([c, -m.vy * s, m.vx * s, 0], m.q);
                    m.q = qMul([c, -m.vy * s, -m.vx * s, 0], m.q);
                    m.matrix = qToMat(m.q);
                }
            });
        }

        const displaceRefract = document.getElementById('displaceRefract');
        // const displaceReflect = document.getElementById('displaceReflect');
        const colorMap = document.getElementById('colorMap');
        const shadowMap = document.getElementById('shadowMap');


        // Render Loop
        let frameCount = 0;
        function loop(now) {
            updatePhysics();


            const pos = [], radii = [], glass = [], core = [], mats = new Float32Array(18);
            state.marbles.forEach((m, i) => {
                pos.push(m.x, window.innerHeight - m.y, m.z);
                radii.push(m.r);
                glass.push(...m.glassColor);
                core.push(...m.coreColor);
                mats.set(m.matrix, i * 9);
            });

            gl.uniform2f(u_canvas_size, state.width, state.height);
            gl.uniform3fv(u_marble_positions, new Float32Array(pos));
            gl.uniform1fv(u_marble_radii, new Float32Array(radii));
            gl.uniform3fv(u_glass_colors, new Float32Array(glass));
            gl.uniform3fv(u_core_colors, new Float32Array(core));
            gl.uniformMatrix3fv(u_marble_matrices, false, mats);


            // Check if marbles are moving or dragging (with settle frames)
            let isMoving = false;
            state.marbles.forEach(m => {
                if (m.isDragging || Math.hypot(m.vx, m.vy) > 0.02 || Math.abs(m.vz) > 0.02) {
                    isMoving = true;
                }
            });

            if (isMoving) {
                state.settleFrames = 15; // Settling counter
            } else if (state.settleFrames > 0) {
                state.settleFrames--;
                isMoving = true;
            }

            gl.clearColor(0, 0, 0, 0);


            let renderWidth = Math.min(Math.round(state.width), 1024);
            let renderHeight = Math.min(Math.round(state.height), 1024);
            canvas.width = renderWidth;
            canvas.height = renderHeight;
            gl.uniform2f(u_viewport_size, canvas.width, canvas.height);
            gl.viewport(0, 0, canvas.width, canvas.height);


            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.uniform1i(u_mode, 2);
            gl.drawArrays(gl.TRIANGLES, 0, 3);
            colorMap.setAttributeNS('http://www.w3.org/1999/xlink', 'href', canvas.toDataURL('image/png'));


            renderWidth = Math.min(Math.round(state.width / 2), 512);
            renderHeight = Math.min(Math.round(state.height / 2), 512);
            canvas.width = renderWidth;
            canvas.height = renderHeight;
            gl.uniform2f(u_viewport_size, canvas.width, canvas.height);
            gl.viewport(0, 0, canvas.width, canvas.height);


            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.uniform1i(u_mode, 0);
            gl.drawArrays(gl.TRIANGLES, 0, 3);
            displaceRefract.setAttributeNS('http://www.w3.org/1999/xlink', 'href', canvas.toDataURL('image/png'));

            // gl.clear(gl.COLOR_BUFFER_BIT);
            // gl.uniform1i(u_mode, 0);
            // gl.drawArrays(gl.TRIANGLES, 0, 3);
            // displaceReflect.setAttributeNS('http://www.w3.org/1999/xlink', 'href', canvas.toDataURL('image/png'));


            renderWidth = Math.min(Math.round(state.width / 4), 512);
            renderHeight = Math.min(Math.round(state.height / 4), 512);
            canvas.width = renderWidth;
            canvas.height = renderHeight;
            gl.uniform2f(u_viewport_size, canvas.width, canvas.height);
            gl.viewport(0, 0, canvas.width, canvas.height);

            gl.clearColor(0, 0, 0, 0);
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.uniform1i(u_mode, 3);
            gl.drawArrays(gl.TRIANGLES, 0, 3);
            shadowMap.setAttributeNS('http://www.w3.org/1999/xlink', 'href', canvas.toDataURL('image/png'));


            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>

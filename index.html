<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Refraction Glass Marble</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            /* Added a background color to see distortion better */
        }

        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            filter: url(#marble-filter);
        }

        #content {
            max-width: 760px;
            margin: auto;
            padding: 10px;
            text-align: center;
            font-family: system-ui, -apple-system, sans-serif;
        }

        svg {
            position: fixed;
            left: 0;
            top: 0;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="content">
            <h1>GLASS MARBLE</h1>
            <p>Move your mouse around this container to see the WebGL refraction and SVG distortion in action.</p>
        </div>
    </div>

    <!-- SVG Filter Definition -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;" xmlns="http://w3.org">
        <defs>
            <filter id="marble-filter" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
                <feImage id="displacementMap" result="displacementMap" preserveAspectRatio="none" />
                <feImage id="colorMap" result="colorMap" preserveAspectRatio="none" />

                <feDisplacementMap in="SourceGraphic" in2="displacementMap"
                                   scale="200"
                                   xChannelSelector="R"
                                   yChannelSelector="G"
                                   result="distortedDOM" />
                <feBlend in="colorMap" in2="distortedDOM" mode="overlay" result="finalOutput" />
            </filter>
        </defs>
    </svg>

    <script type="x-shader/x-vertex" id="vert">
        attribute vec2 a_position;
        void main() {
            gl_Position = vec4(a_position, 0.0, 1.0);
        }
    </script>

    <script type="x-shader/x-fragment" id="frag">
        #define MARBLE_COUNT 2
        #define ITERATIONS 2
        #define DISPLACEMENT_SCALE 100.0
        #define SCALE 0.1
        precision mediump float;
        uniform vec2 u_canvas_size;
        uniform vec3 u_marble_positions[MARBLE_COUNT];
        uniform mat3 u_marble_matrices[MARBLE_COUNT];
        uniform float u_marble_radii[MARBLE_COUNT];
        uniform vec3 u_glass_colors[MARBLE_COUNT];
        uniform vec3 u_pigment_colors[MARBLE_COUNT];
        uniform int u_mode;


        void main() {
            vec4 color = vec4(0);

            vec3 rp = vec3(gl_FragCoord.xy*SCALE, 50);
            vec3 rd = vec3(0, 0, -1);

            for(int iteration=0;iteration<ITERATIONS;iteration++){

                float f_min = -1.0;
                vec3 o_min;
                vec3 xvec = vec3(1, 0, 0);
                vec3 yvec = vec3(0, 0, -1);
                vec3 zvec = vec3(0, 1, 0);
                vec3 glassColor = vec3(1.0);
                vec3 pigmentColor = vec3(0.0);
                float R = 50.0 * SCALE;

                for(int marble_id=0;marble_id<MARBLE_COUNT;marble_id++){
                    vec3 o = u_marble_positions[marble_id]*SCALE;
                    float radius_val = u_marble_radii[marble_id]*SCALE;
                    vec3 d = rp - o;
                    float a = dot(rd, rd);
                    float a_inv_2 = 1.0/2.0/a;
                    float b = 2.0 * dot(d, rd);
                    float c = dot(d, d) - radius_val*radius_val;
                    float D = b*b - 4.0*a*c;
                    if (D>0.0){
                        float f_center = -b * a_inv_2;
                        float f_diff = sqrt(D) * a_inv_2;
                        float f1 = f_center - f_diff;
                        float f2 = f_center + f_diff;
                        float f = (f1 > 0.01) ? f1 : f2;
                        if (f > 0.01 && (f < f_min || f_min < 0.0)) {
                            f_min = f;
                            o_min = o;
                            R = radius_val;
                            xvec = u_marble_matrices[marble_id][0];
                            yvec = u_marble_matrices[marble_id][1];
                            zvec = u_marble_matrices[marble_id][2];
                            glassColor = u_glass_colors[marble_id];
                            pigmentColor = u_pigment_colors[marble_id];
                        }
                    }
                }

                bool inside = false;

                if(f_min >= 0.0){
                    rp = rp + rd * f_min;
                    vec3 n = normalize(rp - o_min);
                    float cosf = dot(rd, n);
                    vec3 sinvec = rd - cosf * n;
                    float N = 1.5;
                    if (cosf > 0.0) N = 1.0/N;
                    else inside = true;
                    float cosf2 = N*N*dot(rd, rd) - dot(sinvec, sinvec);
                    if (cosf2 > 0.0){
                        rd = sinvec + n * sqrt(cosf2) * sign(cosf);
                    } else {
                        rd = sinvec - n * cosf;
                    }
                    rd = normalize(rd);
                }

                // Inside the marble
                f_min=-1.0;
                
                if(inside){
                    float A = 1.0; // 0.0 = flat plane, > 0.0 = parabola
                    float B = 0.2; // 0.0 = flat plane, > 0.0 = parabola

                    float rdx = dot(rd, xvec) / R;
                    float rdy = dot(rd, yvec);
                    float rpx = dot(rp - o_min, xvec) / R;
                    float rpy = dot(rp - o_min, yvec);

                    float a = A * (rdx * rdx);
                    float b = 2.0 * A * rpx * rdx - rdy;
                    float c = A * (rpx * rpx - 1.0) - rpy;

                    float D = b * b - 4.0 * a * c;

                    vec3 n = vec3(0);

                    if (D >= 0.0) {
                        float sqrtD = sqrt(D);
                        float den1 = -b - sqrtD;
                        float den2 = -b + sqrtD;
                        float f1 = (2.0 * c) / den1;
                        float f2 = (abs(den2) > 0.0001) ? (2.0 * c) / den2 : -1.0;
                        float f = f1;
                        if (f2 > 0.0 && f2 < f) f = f2;
                        if (f > 0.01 && (f < f_min || f_min < 0.0)) {
                            vec3 relative_hit_pos = rp + rd * f - o_min;
                            if ( abs(dot(relative_hit_pos, zvec)) < (1.0 - rpx*rpx) * B * R) {
                                f_min = f;
                                float hit_x = dot(relative_hit_pos, xvec);
                                n = normalize((2.0 * A * hit_x / (R * R)) * xvec - yvec);
                            }
                        }
                    }

                    // Base glass color
                    color.rgb = glassColor;
                    color.a = 1.0;

                    if(f_min>0.0){
                        float density = abs(dot(rd, n));
                        color.rgb = mix(glassColor, pigmentColor, density);
                    }
                }

            }

            
            if(u_mode==0){
                rp = rd / rd.z * rp.z + rp;
                color.xy = (rp.xy - gl_FragCoord.xy*SCALE) / DISPLACEMENT_SCALE + 0.5;
                color.a=1.0;
            }

            gl_FragColor = color;
        }
    </script>

    <script>
        const container = document.getElementById('container');
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true, alpha: true });
        canvas.style.position = 'fixed'
        // canvas.style.left = '0'
        // canvas.style.top = '0'
        // document.body.append(canvas)
        canvas.width = 512;
        canvas.height = 512;

        function createShader(type, sourceId) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, document.getElementById(sourceId).textContent.trim());
            gl.compileShader(shader);
            if (gl.getShaderParameter(shader, gl.COMPILE_STATUS)) return shader;
            console.error(gl.getShaderInfoLog(shader));
        }

        function linkProgram(shaders) {
            const program = gl.createProgram();
            for (let shader of shaders) gl.attachShader(program, shader);
            gl.linkProgram(program);
            gl.useProgram(program);
            return program;
        }

        const vertShader = createShader(gl.VERTEX_SHADER, 'vert');
        const fragShader = createShader(gl.FRAGMENT_SHADER, 'frag');
        const program = linkProgram([vertShader, fragShader]);

        // Fullscreen Quad Geometry
        const vertices = new Float32Array([-1, -1, 3, -1, -1, 3]);
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
        const a_position = gl.getAttribLocation(program, 'a_position');
        gl.enableVertexAttribArray(a_position);
        gl.vertexAttribPointer(a_position, 2, gl.FLOAT, false, 0, 0);

        // Declare uniform Locations
        const u_resolution = gl.getUniformLocation(program, 'u_canvas_size');
        const u_marble_positions = gl.getUniformLocation(program, 'u_marble_positions');
        const u_marble_matrices = gl.getUniformLocation(program, 'u_marble_matrices');
        const u_marble_radii = gl.getUniformLocation(program, 'u_marble_radii');
        const u_glass_colors = gl.getUniformLocation(program, 'u_glass_colors');
        const u_pigment_colors = gl.getUniformLocation(program, 'u_pigment_colors');
        const u_mode = gl.getUniformLocation(program, 'u_mode');

        // State Tracking (Identity matrix & tunable properties)
        const state = {
            marbles: [
                { x: window.innerWidth / 3, y: window.innerHeight / 2, z: 20, r: 60, vx: 0, vy: 0, vz: 0, wx: 0, wy: 0, wz: 0, mass: 60 ** 3, glassColor: [0.1, 0.25, 0.45], pigmentColor: [1.0, 0.95, 0.6], q: [1, 0, 0, 0], matrix: [1, 0, 0, 0, 1, 0, 0, 0, 1], isDragging: false },
                { x: 2 * window.innerWidth / 3, y: window.innerHeight / 2, z: 20, r: 40, vx: 0, vy: 0, vz: 0, wx: 0, wy: 0, wz: 0, mass: 40 ** 3, glassColor: [0.35, 0.1, 0.05], pigmentColor: [0.95, 0.55, 1.0], q: [1, 0, 0, 0], matrix: [1, 0, 0, 0, 1, 0, 0, 0, 1], isDragging: false }
            ],
            mouseX: 0, mouseY: 0, draggedIdx: -1, dragOffsetX: 0, dragOffsetY: 0
        };

        // Resize Tracking.
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Mouse interactions
        window.addEventListener('mousedown', (e) => {
            const rect = container.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            let hitIdx = -1;
            for (let i = 0; i < state.marbles.length; i++) {
                const m = state.marbles[i];
                if (Math.hypot(mouseX - m.x, mouseY - m.y) < m.r) {
                    if (hitIdx === -1 || m.z > state.marbles[hitIdx].z) hitIdx = i;
                }
            }

            if (hitIdx !== -1) {
                e.preventDefault();
                state.draggedIdx = hitIdx;
                state.marbles[hitIdx].isDragging = true;
                state.dragOffsetX = mouseX - state.marbles[hitIdx].x;
                state.dragOffsetY = mouseY - state.marbles[hitIdx].y;
            }
        });

        window.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            state.mouseX = e.clientX - rect.left;
            state.mouseY = e.clientY - rect.top;
        });

        const endDrag = () => {
            if (state.draggedIdx !== -1) {
                state.marbles[state.draggedIdx].isDragging = false;
                state.draggedIdx = -1;
            }
        };
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('mouseleave', endDrag);

        // 3D Quaternion/Rotor Math
        const qMul = ([w1, x1, y1, z1], [w2, x2, y2, z2]) => {
            const w = w1 * w2 - x1 * x2 - y1 * y2 - z1 * z2;
            const x = w1 * x2 + x1 * w2 + y1 * z2 - z1 * y2;
            const y = w1 * y2 - x1 * z2 + y1 * w2 + z1 * x2;
            const z = w1 * z2 + x1 * y2 - y1 * x2 + z1 * w2;
            const l = Math.hypot(w, x, y, z);
            return [w / l, x / l, y / l, z / l];
        };

        const qToMat = ([w, x, y, z]) => [
            1 - 2 * y * y - 2 * z * z, 2 * x * y + 2 * w * z, 2 * x * z - 2 * w * y,
            2 * x * y - 2 * w * z, 1 - 2 * x * x - 2 * z * z, 2 * y * z + 2 * w * x,
            2 * x * z + 2 * w * y, 2 * y * z - 2 * w * x, 1 - 2 * x * x - 2 * y * y
        ];

        // Bouncing, elastic collision, and rolling physics simulation
        function updatePhysics() {
            state.marbles.forEach(m => {
                if (m.isDragging) {
                    m.vx = state.mouseX - state.dragOffsetX - m.x;
                    m.vy = state.mouseY - state.dragOffsetY - m.y;
                    m.x += m.vx; m.y += m.vy;
                    m.z += (380 - m.z) * 0.15;
                    m.vz = 0;
                    m.wx = 0; m.wy = 0; m.wz = 0;
                } else {
                    if (m.z > m.r) {
                        m.vz -= 0.6;
                        m.z += m.vz;
                        if (m.z < m.r) { m.z = m.r; m.vz *= -0.55; }
                    }

                    if (m.z === m.r) {
                        const vcx = m.vx - m.wy * m.r;
                        const vcy = m.vy + m.wx * m.r;
                        
                        const lambdaX = -m.mass * vcx / 3.5;
                        const lambdaY = -m.mass * vcy / 3.5;
                        const lambdaLen = Math.hypot(lambdaX, lambdaY);
                        
                        const mu = 0.15;
                        const maxFriction = mu * m.mass * 0.6;
                        
                        let impulseX = lambdaX, impulseY = lambdaY;
                        if (lambdaLen > maxFriction) {
                            impulseX = (lambdaX / lambdaLen) * maxFriction;
                            impulseY = (lambdaY / lambdaLen) * maxFriction;
                        }
                        
                        m.vx += impulseX / m.mass;
                        m.vy += impulseY / m.mass;
                        m.wx += 2.5 * impulseY / (m.mass * m.r);
                        m.wy -= 2.5 * impulseX / (m.mass * m.r);
                    }

                    m.vx *= 0.99; m.vy *= 0.99; m.vz *= 0.99;
                    m.wx *= 0.99; m.wy *= 0.99; m.wz *= 0.99;

                    m.x += m.vx; m.y += m.vy;

                    if (m.x < m.r) { m.x = m.r; m.vx *= -0.8; }
                    else if (m.x > window.innerWidth - m.r) { m.x = window.innerWidth - m.r; m.vx *= -0.8; }
                    if (m.y < m.r) { m.y = m.r; m.vy *= -0.8; }
                    else if (m.y > window.innerHeight - m.r) { m.y = window.innerHeight - m.r; m.vy *= -0.8; }
                }

                const wLen = Math.hypot(m.wx, m.wy, m.wz);
                if (wLen > 0.001) {
                    const half = wLen / 2;
                    const c = Math.cos(half), s = Math.sin(half) / wLen;
                    m.q = qMul([c, m.wx * s, m.wy * s, m.wz * s], m.q);
                    m.matrix = qToMat(m.q);
                }
            });

            const [m1, m2] = state.marbles;
            const dx = m1.x - m2.x, dy = m1.y - m2.y, dz = m1.z - m2.z;
            const dist = Math.hypot(dx, dy, dz), minDist = m1.r + m2.r;
            
            if (dist < minDist && dist > 0.01) {
                const overlap = minDist - dist;
                const nx = dx / dist, ny = dy / dist, nz = dz / dist;
                
                const push = (m, f) => { m.x += nx * overlap * f; m.y += ny * overlap * f; m.z += nz * overlap * f; };
                if (!m1.isDragging && !m2.isDragging) { push(m1, 0.5); push(m2, -0.5); }
                else push(m1.isDragging ? m2 : m1, m1.isDragging ? -1 : 1);

                const r1x = -m1.r * nx, r1y = -m1.r * ny, r1z = -m1.r * nz;
                const r2x = m2.r * nx, r2y = m2.r * ny, r2z = m2.r * nz;

                const vc1x = m1.vx + m1.wy * r1z - m1.wz * r1y;
                const vc1y = m1.vy + m1.wz * r1x - m1.wx * r1z;
                const vc1z = m1.vz + m1.wx * r1y - m1.wy * r1x;

                const vc2x = m2.vx + m2.wy * r2z - m2.wz * r2y;
                const vc2y = m2.vy + m2.wz * r2x - m2.wx * r2z;
                const vc2z = m2.vz + m2.wx * r2y - m2.wy * r2x;

                const vrelx = vc1x - vc2x;
                const vrely = vc1y - vc2y;
                const vrelz = vc1z - vc2z;

                const vrelN = vrelx * nx + vrely * ny + vrelz * nz;

                if (vrelN < 0) {
                    const jN = -1.8 * vrelN / (1 / m1.mass + 1 / m2.mass);
                    const jNx = jN * nx, jNy = jN * ny, jNz = jN * nz;

                    if (!m1.isDragging) { m1.vx += jNx / m1.mass; m1.vy += jNy / m1.mass; m1.vz += jNz / m1.mass; }
                    if (!m2.isDragging) { m2.vx -= jNx / m2.mass; m2.vy -= jNy / m2.mass; m2.vz -= jNz / m2.mass; }

                    const vrelTx = vrelx - vrelN * nx;
                    const vrelTy = vrely - vrelN * ny;
                    const vrelTz = vrelz - vrelN * nz;

                    const invK_T = 1 / (3.5 * (1 / m1.mass + 1 / m2.mass));
                    const lambdaTx = -vrelTx * invK_T;
                    const lambdaTy = -vrelTy * invK_T;
                    const lambdaTz = -vrelTz * invK_T;
                    const lambdaTLen = Math.hypot(lambdaTx, lambdaTy, lambdaTz);

                    const mu = 0.25;
                    const maxFriction = mu * jN;
                    let jTx = lambdaTx, jTy = lambdaTy, jTz = lambdaTz;
                    if (lambdaTLen > maxFriction) {
                        jTx = (lambdaTx / lambdaTLen) * maxFriction;
                        jTy = (lambdaTy / lambdaTLen) * maxFriction;
                        jTz = (lambdaTz / lambdaTLen) * maxFriction;
                    }

                    if (!m1.isDragging) {
                        m1.vx += jTx / m1.mass; m1.vy += jTy / m1.mass; m1.vz += jTz / m1.mass;
                        const t1x = r1y * jTz - r1z * jTy;
                        const t1y = r1z * jTx - r1x * jTz;
                        const t1z = r1x * jTy - r1y * jTx;
                        const I1 = 0.4 * m1.mass * m1.r * m1.r;
                        m1.wx += t1x / I1; m1.wy += t1y / I1; m1.wz += t1z / I1;
                    }
                    if (!m2.isDragging) {
                        m2.vx -= jTx / m2.mass; m2.vy -= jTy / m2.mass; m2.vz -= jTz / m2.mass;
                        const t2x = r2y * jTz - r2z * jTy;
                        const t2y = r2z * jTx - r2x * jTz;
                        const t2z = r2x * jTy - r2y * jTx;
                        const I2 = 0.4 * m2.mass * m2.r * m2.r;
                        m2.wx -= t2x / I2; m2.wy -= t2y / I2; m2.wz -= t2z / I2;
                    }
                }
            }
        }
        const displacementMap = document.getElementById('displacementMap');
        const colorMap = document.getElementById('colorMap');

        // Render Loop
        function loop(now) {
            updatePhysics();

            // Pass positions, radii, colors, and matrices to shader
            gl.uniform2f(u_resolution, canvas.width, canvas.height);

            const pos = [], radii = [], glass = [], pigment = [], mats = new Float32Array(18);
            state.marbles.forEach((m, i) => {
                pos.push(m.x, canvas.height - m.y, m.z);
                radii.push(m.r);
                glass.push(...m.glassColor);
                pigment.push(...m.pigmentColor);
                mats.set(m.matrix, i * 9);
            });

            gl.uniform3fv(u_marble_positions, new Float32Array(pos));
            gl.uniform1fv(u_marble_radii, new Float32Array(radii));
            gl.uniform3fv(u_glass_colors, new Float32Array(glass));
            gl.uniform3fv(u_pigment_colors, new Float32Array(pigment));
            gl.uniformMatrix3fv(u_marble_matrices, false, mats);

            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.clearColor(0, 0, 0, 0);

            // Render displacement map.
            gl.uniform1i(u_mode, 0);
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.drawArrays(gl.TRIANGLES, 0, 3);
            displacementMap.setAttributeNS('http://www.w3.org/1999/xlink', 'href', canvas.toDataURL('image/png'));

            // Render color map.
            gl.uniform1i(u_mode, 1);
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.drawArrays(gl.TRIANGLES, 0, 3);
            colorMap.setAttributeNS('http://www.w3.org/1999/xlink', 'href', canvas.toDataURL('image/png'));

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>

</body>

</html>

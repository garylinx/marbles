<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Refraction Glass Marble</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            filter: url(#marble-filter);
        }

        #content {
            min-width: 760px;
            margin: auto;
            padding: 10px;
            text-align: center;
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="content">
            <h1>GLASS MARBLE</h1>
            <p>Move your mouse around this container to see the WebGL refraction and SVG distortion in action.</p>
        </div>
    </div>
    <!-- SVG Filter Definition -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;" xmlns="http://w3.org">
        <defs>
            <filter id="marble-filter" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
                <feImage id="canvas-texture" result="webglMap" preserveAspectRatio="none" />
                <feDisplacementMap in="SourceGraphic" in2="webglMap"
                                   scale="150"
                                   xChannelSelector="R"
                                   yChannelSelector="G"
                                   result="distortedDOM" />

                <feComponentTransfer in="SourceGraphic" result="source50">
                    <feFuncA type="linear" slope="0.5" />
                </feComponentTransfer>

                <feComponentTransfer in="distortedDOM" result="distorted50">
                    <feFuncA type="linear" slope="0.5" />
                </feComponentTransfer>

                <feComposite in="distorted50" in2="source50" operator="over" result="mixedDOM" />
            </filter>
        </defs>
    </svg>

    <script type="x-shader/x-vertex" id="vert">
        attribute vec2 a_position;
        void main() {
            gl_Position = vec4(a_position, 0.0, 1.0);
        }
    </script>

    <script type="x-shader/x-fragment" id="frag">
        precision mediump float;
        uniform vec2 u_resolution;
        uniform vec2 u_mouse;
        uniform float u_time;
        uniform float u_aspect;
        uniform float u_radius;
        void main() {
            vec2 uv = gl_FragCoord.xy / u_resolution.xy;
            vec2 aspect = vec2(u_aspect, 1.0);
            vec2 p = uv * aspect;
            vec2 m = u_mouse * aspect;
            vec2 d = p - m;
            float r = u_radius;
            float dist = length(d);
            vec4 color = vec4(0.5, 0.5, 0.5, 1.0);
            if (dist < r) {
                color.r = 0.0;
            }
            gl_FragColor = color;
        }
    </script>

    <script>
        const container = document.getElementById('container');
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true, alpha: false });

        canvas.width = 512;
        canvas.height = 512;

        function createShader(type, sourceId) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, document.getElementById(sourceId).textContent.trim());
            gl.compileShader(shader);
            if (gl.getShaderParameter(shader, gl.COMPILE_STATUS)) return shader;
            console.error(gl.getShaderInfoLog(shader));

        }

        function linkProgram(shaders) {
            const program = gl.createProgram();
            for (let shader of shaders) gl.attachShader(program, shader);
            gl.linkProgram(program);
            gl.useProgram(program);
            return program;
        }



        const vertShader = createShader(gl.VERTEX_SHADER, 'vert')
        const fragShader = createShader(gl.FRAGMENT_SHADER, 'frag')
        const program = linkProgram([vertShader, fragShader])

        // Fullscreen Quad Geometry
        const vertices = new Float32Array([-1, -1, 3, -1, -1, 3]);
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
        const a_position = gl.getAttribLocation(program, 'a_position');
        gl.enableVertexAttribArray(a_position);
        gl.vertexAttribPointer(a_position, 2, gl.FLOAT, false, 0, 0);

        // Declare uniform Locations
        const uRes = gl.getUniformLocation(program, 'u_resolution');
        const uMouse = gl.getUniformLocation(program, 'u_mouse');
        const uTime = gl.getUniformLocation(program, 'u_time');
        const uAspect = gl.getUniformLocation(program, 'u_aspect');
        const uRadius = gl.getUniformLocation(program, 'u_radius');

        // State Tracking
        const state = { mouseX: 0.5, mouseY: 0.5, aspect: 1.0, radius: 0.15 };

        function updateBounds() {
            const rect = container.getBoundingClientRect();
            state.aspect = rect.width / rect.height;
            // Target physical radius of 150 pixels relative to the container's height (viewport height)
            state.radius = 150.0 / rect.height;
        }

        window.addEventListener('resize', updateBounds);
        updateBounds();

        window.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            state.mouseX = (e.clientX - rect.left) / rect.width;
            state.mouseY = 1.0 - ((e.clientY - rect.top) / rect.height);
        });

        const feImage = document.getElementById('canvas-texture');

        // Render Loop
        function loop(now) {
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.clearColor(0.5, 0.5, 0.5, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            // Pass Uniforms
            gl.uniform2f(uRes, canvas.width, canvas.height);
            gl.uniform2f(uMouse, state.mouseX, state.mouseY);
            gl.uniform1f(uTime, now * 0.001);
            gl.uniform1f(uAspect, state.aspect);
            gl.uniform1f(uRadius, state.radius);
            gl.drawArrays(gl.TRIANGLES, 0, 3);
            feImage.setAttributeNS('http://www.w3.org/1999/xlink', 'href', canvas.toDataURL('image/png'));

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>

</body>

</html>
